<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<th:block th:replace="layout/vendor-layout :: layout">
    <th:block th:fragment="pageContent">
        <div class="container mt-4">
            <div class="card">
                <div class="card-header">
                    <h4>Cập Nhật Sản Phẩm</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/vendor/product/update}" method="post" enctype="multipart/form-data"
                          th:object="${product}">
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label">Tên sản phẩm</label>
                            <input type="text" class="form-control" th:field="*{productName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá khuyến mãi</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{salePrice}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số lượng</label>
                            <input type="number" class="form-control" th:field="*{amount}" required>
                        </div>

                        <div class="col-md-4 select-container">
                            <h5>Danh mục</h5>
                            <select name="categoryIds" multiple class="form-control">
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.categoryName}"
                                        th:selected="${product.categoryIds != null} ? ${product.categoryIds.contains(cat.id)} : false">
                                </option>
                            </select>
                        </div>

                        <!-- Section -->
                        <div class="add-listing-section margin-top-45">
                            <!-- Headline -->
                            <div class="add-listing-headline">
                                <h3>
                                    <i class="sl sl-icon-picture"></i> Images
                                </h3>
                            </div>
                            <!-- Thẻ Chứa Slideshow -->
                            <div class="slideshow-container" style="width: 30%;">
                                <!-- Kết hợp hình ảnh và nội dung cho mội phần tử trong slideshow-->
                                <th:block th:each="y: ${product.productImage}">
                                    <div class="mySlides">
                                        <a th:href="@{/vendor/product/delete-image/{id}(id=${y.id})}" class="delete_img"> <i
                                                style="color: #fff; line-height: 30px;"
                                                class="sl sl-icon-close"></i>

                                        </a> <img th:src="${y.url_Image}" style="width: 100%">
                                    </div>
                                </th:block>
                                <!-- Nút điều khiển mũi tên-->
                                <a class="prev" onclick="plusSlides(-1)">❮</a> <a class="next"
                                                                                  onclick="plusSlides(1)">❯</a>
                            </div>
                            <br>
                            <!-- Nút tròn điều khiển slideshow-->
                            <div style="text-align: center">
                                <th:block th:each="y: ${product.productImage}">
                                    <span class="dotw" th:onclick="'currentSlide('+ ${yStat.index+1} +')'"></span>
                                </th:block>

                            </div>
                            <!-- Dropzone -->
                            <div class="submit-section">

                                <div class="upload__box" style="padding-top: 40px;">
                                    <div class="upload__btn-box">
                                        <label class="upload__btn" style="border-radius: 50px;">
                                            <p style="margin-bottom: 0px;">Add images</p> <input
                                                name="listImage" accept="image/*" type="file"
                                                data-max_length="20" class="upload__inputfile" multiple>
                                        </label>
                                    </div>
                                    <div class="upload__img-wrap"></div>
                                </div>
                            </div>
                        </div>
                        <!-- Section / End -->

                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary">Cập Nhật</button>
                            <a th:href="@{/vendor/product}" class="btn btn-secondary">Quay lại danh sách</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>
</th:block>
<script>
    var slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
        showSlides(slideIndex += n);
    }

    function currentSlide(n) {
        showSlides(slideIndex = n);
    }

    function showSlides(n) {
        var i;
        var slides = document.getElementsByClassName("mySlides");
        var dots = document.getElementsByClassName("dot");
        if (n > slides.length) {
            slideIndex = 1
        }
        if (n < 1) {
            slideIndex = slides.length
        }
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }
        slides[slideIndex - 1].style.display = "block";
        /* dots[slideIndex - 1].className += " active"; */
    }
</script>
<script>
    jQuery(document).ready(function () {
        ImgUpload();
    });

    function ImgUpload() {
        var imgWrap = "";
        var imgArray = [];

        $('.upload__inputfile')
            .each(
                function () {
                    $(this)
                        .on(
                            'change',
                            function (e) {
                                imgWrap = $(this)
                                    .closest(
                                        '.upload__box')
                                    .find(
                                        '.upload__img-wrap');
                                var maxLength = $(this)
                                    .attr(
                                        'data-max_length');

                                var files = e.target.files;
                                var filesArr = Array.prototype.slice
                                    .call(files);
                                var iterator = 0;
                                filesArr
                                    .forEach(function (
                                        f, index) {

                                        if (!f.type
                                            .match('image.*')) {
                                            return;
                                        }

                                        if (imgArray.length > maxLength) {
                                            return false
                                        } else {
                                            var len = 0;
                                            for (var i = 0; i < imgArray.length; i++) {
                                                if (imgArray[i] !== undefined) {
                                                    len++;
                                                }
                                            }
                                            if (len > maxLength) {
                                                return false;
                                            } else {
                                                imgArray
                                                    .push(f);

                                                var reader = new FileReader();
                                                reader.onload = function (
                                                    e) {
                                                    var html = "<div class='upload__img-box'><div style='background-image: url("
                                                        + e.target.result
                                                        + ")' data-number='"
                                                        + $(".upload__img-close").length
                                                        + "' data-file='"
                                                        + f.name
                                                        + "' class='img-bg'><div class='upload__img-close'></div></div></div>";
                                                    imgWrap
                                                        .append(html);
                                                    iterator++;
                                                }
                                                reader
                                                    .readAsDataURL(f);
                                            }
                                        }
                                    });
                            });
                });

        $('body').on('click', ".upload__img-close", function (e) {
            var file = $(this).parent().data("file");
            for (var i = 0; i < imgArray.length; i++) {
                if (imgArray[i].name === file) {
                    imgArray.splice(i, 1);
                    break;
                }
            }
            $(this).parent().parent().remove();
        });
    }
</script>

</body>
</html>
