<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<th:block th:replace="layout/admin-layout :: layout">
    <th:block th:fragment="pageContent">
        <div class="container mt-4">
            <div class="card">
                <div class="card-header">
                    <h4>Cập Nhật Sản Phẩm</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/product/update}" method="post" enctype="multipart/form-data" th:object="${product}">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Tên sản phẩm</label>
                            <input type="text" class="form-control" th:field="*{productName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá khuyến mãi</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{salePrice}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số lượng</label>
                            <input type="number" class="form-control" th:field="*{amount}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Danh mục</label>
                            <select class="form-select" th:field="*{categoryId}">
                                <option value="" disabled>-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.categoryName}"
                                        th:selected="${cat.id == product.categoryId}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ảnh sản phẩm mới</label>
                            <input type="file" class="form-control" name="file" accept="image/*">
                        </div>

                        <div class="mb-3" th:if="${product.thumbnail != null}">
                            <label class="form-label">Ảnh hiện tại:</label><br>
                            <img th:src="@{${product.thumbnail}}" alt="Ảnh hiện tại" style="height: 100px;">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="1" th:selected="${product.status == 1}">Hoạt động</option>
                                <option value="0" th:selected="${product.status == 0}">Không hoạt động</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary">Cập Nhật</button>
                            <a th:href="@{/admin/product}" class="btn btn-secondary">Quay lại danh sách</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </th:block>
</th:block>
</body>
</html>
