<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<th:block th:replace="layout/admin-layout :: layout">
    <th:block th:fragment="pageContent">

        <div class="container mt-4">

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Danh sách sản phẩm</h4>
                    <a class="btn btn-primary btn-sm" th:href="@{/admin/product/insert}">+ Thêm sản phẩm</a>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Tên sản phẩm</th>
                            <th>Ảnh</th>
                            <th>Giá</th>
                            <th>Giá khuyến mãi</th>
                            <th>Số lượng</th>
                            <th>Danh mục</th>
                            <th>Người tạo</th>
                            <th>Trạng thái</th> <!-- Cột Trạng thái -->
                            <th>Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product, iterStat : ${products}">
                            <td th:text="${iterStat.index + 1}">1</td>
                            <td th:text="${product.productName}">Sản phẩm A</td>
                            <td><img th:src="${product.thumbnail}" alt=""></td>
                            <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')} + ' đ'">100.000 đ</td>
                            <td th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 2, 'POINT')} + ' đ'">90.000 đ</td>
                            <td th:text="${product.amount}">10</td>
                            <td th:text="${product.categoryName}">Điện tử</td>
                            <td th:text="${product.email}">Điện tử</td>
                            <td>
                                <span th:text="${product.status == 1 ? 'Hoạt động' : 'Không hoạt động'}"></span>
                            </td>
                            <td>
                                <a th:href="@{'/admin/product/update/' + ${product.id}}"
                                   class="btn btn-warning btn-sm">Sửa</a>
                                <a th:href="@{'/admin/product/delete/' + ${product.id}}"
                                   class="btn btn-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="9" class="text-center">Không có sản phẩm nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </th:block>
</th:block>

</body>
</html>
